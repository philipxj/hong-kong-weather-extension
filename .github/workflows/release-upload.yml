name: Release Upload

on:
  workflow_dispatch:
    inputs:
      upload_chrome:
        description: Upload the package to the configured Chrome Web Store draft.
        required: false
        default: false
        type: boolean
      submit_chrome:
        description: Submit the uploaded Chrome Web Store draft for review.
        required: false
        default: false
        type: boolean
      upload_edge:
        description: Upload the package to Microsoft Edge Add-ons, submit it for review, and publish automatically after certification.
        required: false
        default: false
        type: boolean
      upload_firefox:
        description: Upload the Firefox package and source to AMO and submit it for review.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  draft-upload:
    runs-on: ubuntu-latest
    env:
      CHROME_EXTENSION_ID: ${{ vars.CHROME_EXTENSION_ID || secrets.CHROME_EXTENSION_ID }}
      CHROME_PUBLISHER_ID: ${{ vars.CHROME_PUBLISHER_ID || secrets.CHROME_PUBLISHER_ID }}
      CHROME_CLIENT_ID: ${{ vars.CHROME_CLIENT_ID || secrets.CHROME_CLIENT_ID }}
      CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
      CHROME_SUBMIT_REVIEW: ${{ inputs.submit_chrome && 'true' || 'false' }}
      EDGE_PRODUCT_ID: ${{ vars.EDGE_PRODUCT_ID || secrets.EDGE_PRODUCT_ID }}
      EDGE_CLIENT_ID: ${{ vars.EDGE_CLIENT_ID || secrets.EDGE_CLIENT_ID }}
      EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
      EDGE_SUBMIT_REVIEW: ${{ inputs.upload_edge && 'true' || 'false' }}
      FIREFOX_ADDON_ID: ${{ vars.FIREFOX_ADDON_ID || secrets.FIREFOX_ADDON_ID }}
      FIREFOX_JWT_ISSUER: ${{ vars.FIREFOX_JWT_ISSUER || secrets.FIREFOX_JWT_ISSUER }}
      FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
      FIREFOX_LICENSE: ${{ vars.FIREFOX_LICENSE || 'MIT' }}
      FIREFOX_SUBMISSION_NOTES: ${{ vars.FIREFOX_SUBMISSION_NOTES || 'Submitted by release workflow. See docs/amo-source-build.md for reproducible build instructions.' }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm test

      - name: Package Chromium extension
        id: package
        run: |
          npm run package:chromium | tee package.log
          ZIP_PATH="$(tail -n 1 package.log)"
          test -f "$ZIP_PATH"
          echo "zip_path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"
          unzip -Z1 "$ZIP_PATH" | sed -n '1,40p'
          unzip -Z1 "$ZIP_PATH" | grep -qx 'manifest.json'

      - uses: actions/upload-artifact@v7
        with:
          name: chromium-extension-package
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Package Firefox extension
        if: ${{ inputs.upload_firefox }}
        id: package_firefox
        run: |
          npm run package:firefox | tee package-firefox.log
          FIREFOX_ZIP_PATH="$(tail -n 1 package-firefox.log)"
          test -f "$FIREFOX_ZIP_PATH"
          echo "zip_path=${FIREFOX_ZIP_PATH}" >> "$GITHUB_OUTPUT"
          unzip -Z1 "$FIREFOX_ZIP_PATH" | sed -n '1,40p'
          unzip -Z1 "$FIREFOX_ZIP_PATH" | grep -qx 'manifest.json'

      - name: Package source archive
        if: ${{ inputs.upload_firefox }}
        id: package_source
        run: |
          npm run package:source | tee package-source.log
          SOURCE_ZIP_PATH="$(tail -n 1 package-source.log)"
          test -f "$SOURCE_ZIP_PATH"
          echo "zip_path=${SOURCE_ZIP_PATH}" >> "$GITHUB_OUTPUT"
          unzip -Z1 "$SOURCE_ZIP_PATH" | sed -n '1,40p'
          unzip -Z1 "$SOURCE_ZIP_PATH" | grep -qx 'package.json'

      - uses: actions/upload-artifact@v7
        if: ${{ inputs.upload_firefox }}
        with:
          name: firefox-extension-package
          path: |
            ${{ steps.package_firefox.outputs.zip_path }}
            ${{ steps.package_source.outputs.zip_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Sync GitHub Release
        if: ${{ inputs.upload_chrome || inputs.upload_edge || inputs.upload_firefox }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/sync-github-release.mjs "${{ steps.package.outputs.zip_path }}"

      - name: Upload Chrome Web Store draft
        if: ${{ inputs.upload_chrome && env.CHROME_EXTENSION_ID != '' && env.CHROME_PUBLISHER_ID != '' && env.CHROME_CLIENT_ID != '' && env.CHROME_CLIENT_SECRET != '' && env.CHROME_REFRESH_TOKEN != '' }}
        run: node scripts/upload-chrome-draft.mjs "${{ steps.package.outputs.zip_path }}"

      - name: Skip Chrome Web Store draft upload
        if: ${{ !inputs.upload_chrome || env.CHROME_EXTENSION_ID == '' || env.CHROME_PUBLISHER_ID == '' || env.CHROME_CLIENT_ID == '' || env.CHROME_CLIENT_SECRET == '' || env.CHROME_REFRESH_TOKEN == '' }}
        run: echo "Chrome Web Store draft upload was not requested or credentials are incomplete; uploaded the package artifact only."

      - name: Upload Microsoft Edge Add-ons draft
        if: ${{ inputs.upload_edge && env.EDGE_PRODUCT_ID != '' && env.EDGE_CLIENT_ID != '' && env.EDGE_API_KEY != '' }}
        run: node scripts/upload-edge-draft.mjs "${{ steps.package.outputs.zip_path }}"

      - name: Skip Microsoft Edge Add-ons draft upload
        if: ${{ !inputs.upload_edge || env.EDGE_PRODUCT_ID == '' || env.EDGE_CLIENT_ID == '' || env.EDGE_API_KEY == '' }}
        run: echo "Microsoft Edge Add-ons draft upload/submission was not requested or credentials are incomplete; uploaded the package artifact only."

      - name: Upload Firefox Add-ons draft
        if: ${{ inputs.upload_firefox && env.FIREFOX_ADDON_ID != '' && env.FIREFOX_JWT_ISSUER != '' && env.FIREFOX_JWT_SECRET != '' }}
        run: node scripts/upload-firefox-draft.mjs "${{ steps.package_firefox.outputs.zip_path }}" "${{ steps.package_source.outputs.zip_path }}"

      - name: Skip Firefox Add-ons draft upload
        if: ${{ !inputs.upload_firefox || env.FIREFOX_ADDON_ID == '' || env.FIREFOX_JWT_ISSUER == '' || env.FIREFOX_JWT_SECRET == '' }}
        run: echo "Firefox Add-ons upload/submission was not requested or credentials are incomplete; uploaded the package artifacts only."
