name: Feature request
description: Suggest an improvement for Hong Kong Weather.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and why does it matter?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds?
  - type: dropdown
    id: browser
    attributes:
      label: Browser priority
      options:
        - Chrome / Edge
        - Firefox
        - All supported browsers
        - Not browser-specific
