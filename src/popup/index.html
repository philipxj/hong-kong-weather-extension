<!doctype html>
<html lang="en" class="popup-page">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>香港天氣預報</title>
    <link rel="stylesheet" href="../shared/ui.css" />
  </head>
  <body class="popup-page">
    <main class="popup-shell legacy-weather">
      <div class="window-notch" aria-hidden="true"></div>

      <div class="legacy-actions">
        <button
          id="hko-page"
          class="legacy-icon-button observatory-page-button"
          title="Open Hong Kong Observatory"
          aria-label="Open Hong Kong Observatory"
        >
          <svg
            class="observatory-link-icon"
            viewBox="0 0 32 32"
            aria-hidden="true"
            focusable="false"
          >
            <rect class="observatory-link-badge" x="3" y="8" width="22" height="16" rx="6" />
            <text class="observatory-link-text" x="14" y="19.5">HKO</text>
            <path class="observatory-link-arrow" d="M20 6h6v6" />
            <path class="observatory-link-arrow" d="M18.8 13.2 26 6" />
          </svg>
        </button>
        <button id="settings" class="legacy-icon-button" title="Settings" aria-label="Settings">
          ⚙
        </button>
        <button id="refresh" class="legacy-icon-button" title="Refresh" aria-label="Refresh">
          ⟳
        </button>
      </div>

      <div id="error" class="error-panel" hidden></div>
      <div id="loading" class="loading-state">
        不能直接用 file:// 開啟 popup；請用開發伺服器或載入擴充功能。
      </div>

      <section id="content" class="legacy-content" hidden>
        <section class="legacy-current" aria-label="Current weather">
          <div class="current-title-row">
            <span class="weather-icon-frame">
              <img id="weather-icon" class="main-weather-icon" alt="" />
            </span>
            <span id="top-summary" class="legacy-weather-title">--</span>
          </div>

          <div class="legacy-readings">
            <div class="legacy-reading">
              <span id="label-current-temp">現時氣溫</span>
              <strong id="top-temp">--</strong>
            </div>
            <div class="legacy-reading">
              <span id="label-humidity">相對濕度</span>
              <strong id="top-humidity">--</strong>
            </div>
            <div class="legacy-reading legacy-reading-uv">
              <span id="label-uv">紫外線指數</span>
              <strong><span id="top-uv-value">--</span> <small id="top-uv-desc"></small></strong>
            </div>
          </div>

          <div
            id="warning-signal-row"
            class="warning-signal-row"
            aria-label="Current warning signals"
          ></div>
        </section>

        <button id="special-weather-open" class="special-weather-card" type="button">
          <div id="special-weather-title" class="special-weather-title">特別天氣提示</div>
          <div id="warning-count" class="special-weather-content">--</div>
        </button>

        <section class="legacy-side-panel" aria-label="Weather imagery">
          <div id="imagery-card" class="imagery-card">
            <div class="imagery-tabs" role="tablist" aria-label="Weather imagery">
              <button
                class="imagery-tab"
                type="button"
                role="tab"
                aria-selected="true"
                data-panel="radar"
              >
                雷達
              </button>
              <button
                class="imagery-tab"
                type="button"
                role="tab"
                aria-selected="false"
                data-panel="lightning"
              >
                閃電
              </button>
              <button
                id="tropical-cyclone-tab"
                class="imagery-tab"
                type="button"
                role="tab"
                aria-selected="false"
                data-panel="typhoon"
                hidden
              >
                颱風
              </button>
            </div>
            <div id="imagery-open" class="imagery-preview" role="button" tabindex="0">
              <img id="imagery-image" alt="" />
              <div id="imagery-stepper" class="imagery-stepper" aria-label="Image snapshots">
                <span id="imagery-position" class="imagery-position">-- / --</span>
              </div>
              <button id="imagery-expand" class="imagery-expand" type="button">放大</button>
              <div id="imagery-step-hint" class="imagery-step-hint" aria-hidden="true" hidden>
                <span class="imagery-step-hint-arrow imagery-step-hint-left">‹</span>
                <span class="imagery-step-hint-arrow imagery-step-hint-right">›</span>
              </div>
              <span id="imagery-fallback" class="imagery-fallback" hidden>Loading</span>
            </div>
            <div class="imagery-caption">
              <span id="imagery-title">時間</span>
              <span id="imagery-time">--</span>
            </div>
            <div id="radar-ranges" class="radar-ranges" aria-label="Radar range"></div>
            <div
              id="imagery-toast"
              class="imagery-toast"
              role="status"
              aria-live="polite"
              hidden
            ></div>

            <div id="tropical-cyclone-view" class="tropical-cyclone-view" role="tabpanel" hidden>
              <div class="tropical-cyclone-header">
                <span id="tropical-cyclone-kicker" class="tropical-cyclone-kicker">熱帶氣旋</span>
                <span id="tropical-cyclone-name" class="tropical-cyclone-name" hidden></span>
                <select
                  id="tropical-cyclone-select"
                  class="tropical-cyclone-select"
                  aria-label="選擇熱帶氣旋"
                  hidden
                ></select>
              </div>
              <dl class="tropical-cyclone-facts">
                <div>
                  <dt id="tropical-cyclone-time-label">時間</dt>
                  <dd id="tropical-cyclone-meta" class="tropical-cyclone-meta"></dd>
                </div>
                <div>
                  <dt id="tropical-cyclone-distance-label">位置</dt>
                  <dd id="tropical-cyclone-distance" class="tropical-cyclone-distance"></dd>
                </div>
                <div>
                  <dt id="tropical-cyclone-wind-label">風速</dt>
                  <dd id="tropical-cyclone-wind" class="tropical-cyclone-wind"></dd>
                </div>
              </dl>
              <p id="tropical-cyclone-description" class="tropical-cyclone-description"></p>
              <div class="tropical-cyclone-actions">
                <button id="typhoon-track-map" class="tropical-cyclone-track-map" type="button">
                  路徑圖
                </button>
                <button id="typhoon-map" class="tropical-cyclone-track" type="button">
                  <span id="typhoon-map-label">詳情</span>
                  <svg
                    class="external-link-icon"
                    viewBox="0 0 16 16"
                    aria-hidden="true"
                    focusable="false"
                  >
                    <path
                      d="M6 4H3.5A1.5 1.5 0 0 0 2 5.5v7A1.5 1.5 0 0 0 3.5 14h7A1.5 1.5 0 0 0 12 12.5V10"
                    />
                    <path d="M9 2h5v5" />
                    <path d="m8 8 6-6" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </section>

        <section class="legacy-forecast" aria-label="Weather forecast">
          <div id="forecast-list" class="legacy-forecast-list"></div>
        </section>

        <div class="legacy-meta" aria-live="polite">
          <span class="legacy-meta-status">
            <span id="updating" class="updating" hidden>Updating...</span>
            <span id="cache-note"></span>
          </span>
          <span id="hong-kong-time" class="hong-kong-time">香港時間 --:--</span>
          <span id="last-updated" class="timestamp">Last updated: --</span>
        </div>
      </section>
      <div
        id="typhoon-track-map-overlay"
        class="typhoon-track-map-overlay"
        role="dialog"
        aria-modal="true"
        aria-label="熱帶氣旋路徑圖"
        hidden
      >
        <div class="typhoon-track-map-panel">
          <button
            id="typhoon-track-map-close"
            class="typhoon-track-map-close"
            type="button"
            aria-label="關閉路徑圖"
          >
            關閉
          </button>
          <img id="typhoon-track-map-image" class="typhoon-track-map-image" alt="熱帶氣旋路徑圖" />
          <div id="typhoon-track-map-message" class="typhoon-track-map-message" hidden>
            <span id="typhoon-track-map-fallback" class="typhoon-track-map-fallback"></span>
            <button
              id="typhoon-track-map-retry"
              class="typhoon-track-map-retry"
              type="button"
              hidden
            >
              重新載入
            </button>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
