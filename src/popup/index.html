<!doctype html>
<html lang="en" class="popup-page">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>香港天氣預報</title>
    <link rel="stylesheet" href="../shared/ui.css" />
  </head>
  <body class="popup-page">
    <main class="popup-shell legacy-weather">
      <div class="window-notch" aria-hidden="true"></div>

      <div class="legacy-actions">
        <button
          id="hko-page"
          class="legacy-icon-button observatory-page-button"
          title="Open Hong Kong Observatory"
          aria-label="Open Hong Kong Observatory"
        >
          <svg
            class="observatory-link-icon"
            viewBox="0 0 32 32"
            aria-hidden="true"
            focusable="false"
          >
            <rect class="observatory-link-badge" x="3" y="8" width="22" height="16" rx="6" />
            <text class="observatory-link-text" x="14" y="19.5">HKO</text>
            <path class="observatory-link-arrow" d="M20 6h6v6" />
            <path class="observatory-link-arrow" d="M18.8 13.2 26 6" />
          </svg>
        </button>
        <button id="settings" class="legacy-icon-button" title="Settings" aria-label="Settings">
          ⚙
        </button>
        <button id="refresh" class="legacy-icon-button" title="Refresh" aria-label="Refresh">
          ⟳
        </button>
      </div>

      <div id="error" class="error-panel" hidden></div>
      <div id="loading" class="loading-state">Loading weather data...</div>

      <section id="content" class="legacy-content" hidden>
        <section class="legacy-current" aria-label="Current weather">
          <div class="current-title-row">
            <span class="weather-icon-frame">
              <img id="weather-icon" class="main-weather-icon" alt="" />
            </span>
            <span id="top-summary" class="legacy-weather-title">--</span>
          </div>

          <div class="legacy-readings">
            <div class="legacy-reading">
              <span id="label-current-temp">現時氣溫</span>
              <strong id="top-temp">--</strong>
            </div>
            <div class="legacy-reading">
              <span id="label-humidity">相對濕度</span>
              <strong id="top-humidity">--</strong>
            </div>
            <div class="legacy-reading legacy-reading-uv">
              <span id="label-uv">紫外線指數</span>
              <strong><span id="top-uv-value">--</span> <small id="top-uv-desc"></small></strong>
            </div>
          </div>

          <div
            id="warning-signal-row"
            class="warning-signal-row"
            aria-label="Current warning signals"
          ></div>

          <button id="special-weather-open" class="special-weather-card" type="button">
            <div id="special-weather-title" class="special-weather-title">特別天氣提示</div>
            <div id="warning-count" class="special-weather-content">--</div>
          </button>
        </section>

        <section class="legacy-side-panel" aria-label="Weather imagery">
          <div id="imagery-card" class="imagery-card">
            <div class="imagery-tabs" role="tablist" aria-label="Weather imagery">
              <button
                class="imagery-tab"
                type="button"
                role="tab"
                aria-selected="true"
                data-imagery="radar"
              >
                雷達
              </button>
              <button
                class="imagery-tab"
                type="button"
                role="tab"
                aria-selected="false"
                data-imagery="lightning"
              >
                閃電
              </button>
            </div>
            <div
              id="imagery-open"
              class="imagery-preview"
              role="button"
              tabindex="0"
              aria-label="Open imagery"
            >
              <img id="imagery-image" alt="" />
              <div id="imagery-stepper" class="imagery-stepper" aria-label="Image snapshots">
                <button
                  id="imagery-prev"
                  class="imagery-stepper-button"
                  type="button"
                  aria-label="Previous image"
                >
                  ‹
                </button>
                <span id="imagery-position" class="imagery-position">-- / --</span>
                <button
                  id="imagery-next"
                  class="imagery-stepper-button"
                  type="button"
                  aria-label="Next image"
                >
                  ›
                </button>
              </div>
              <span id="imagery-fallback" class="imagery-fallback" hidden>Loading</span>
            </div>
            <div class="imagery-caption">
              <span id="imagery-title">等雨量線圖</span>
              <span id="imagery-time">--</span>
            </div>
            <div id="radar-ranges" class="radar-ranges" aria-label="Radar range"></div>
          </div>

          <button id="typhoon-map" class="typhoon-map-button" type="button">
            颱風 尤特 路徑圖
          </button>
        </section>

        <section class="legacy-forecast" aria-label="Weather forecast">
          <div id="forecast-list" class="legacy-forecast-list"></div>
        </section>

        <div class="legacy-meta" aria-live="polite">
          <span id="updating" class="updating" hidden>Updating...</span>
          <span id="cache-note"></span>
          <span id="last-updated" class="timestamp">Last updated: --</span>
        </div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
